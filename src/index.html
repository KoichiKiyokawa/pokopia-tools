<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぽこあ 味の好み検索</title>
  <meta name="description" content="ポケモン名から、にがい・すっぱい・からい・あまい・しぶいの好みを検索できるツールです。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
:root {
  --bg-top: #fff7d8;
  --bg-bottom: #ffe8d4;
  --panel: rgba(255, 252, 245, 0.88);
  --panel-strong: #fffdf7;
  --text-main: #3a2a1c;
  --text-soft: #7a6652;
  --line: rgba(141, 97, 52, 0.16);
  --shadow: 0 16px 44px rgba(123, 76, 31, 0.12);
  --radius-xl: 28px;
  --radius-lg: 22px;
  --radius-md: 16px;
  --taste-bitter: #9da94f;
  --taste-sour: #f08b43;
  --taste-spicy: #dd5a3d;
  --taste-sweet: #ef83a4;
  --taste-astringent: #7585b8;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Noto Sans JP", sans-serif;
  color: var(--text-main);
  background:
    radial-gradient(circle at top left, rgba(255, 255, 255, 0.88), transparent 34%),
    radial-gradient(circle at right 18% top 12%, rgba(255, 209, 163, 0.75), transparent 22%),
    linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
  min-height: 100vh;
}

.page {
  width: min(1120px, calc(100% - 32px));
  margin: 0 auto;
  padding: 40px 0 56px;
}

.hero {
  position: relative;
  padding: 12px 4px 28px;
}

.hero-kicker {
  margin: 0 0 10px;
  color: #b56a2c;
  font-size: 0.88rem;
  font-weight: 800;
  letter-spacing: 0.08em;
}

.hero h1 {
  margin: 0;
  font-family: "Mochiy Pop One", sans-serif;
  font-size: clamp(2rem, 4vw, 3.3rem);
  line-height: 1.2;
}

.hero-title-row {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  position: relative;
}

.hero-actions {
  position: absolute;
  top: 8px;
  right: 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.hero-help {
  width: 38px;
  height: 38px;
  border: 0;
  border-radius: 999px;
  background: rgba(255, 253, 248, 0.92);
  color: #b56a2c;
  box-shadow: 0 10px 24px rgba(123, 76, 31, 0.1);
  font: inherit;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
}

.hero-github-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 38px;
  border-radius: 999px;
  background: #3a2a1c;
  color: #fff8ef;
  box-shadow: 0 10px 24px rgba(58, 42, 28, 0.18);
  text-decoration: none;
}

.hero-github-link svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.hero-help-pop {
  position: absolute;
  top: calc(100% + 12px);
  left: 0;
  z-index: 5;
  width: min(560px, calc(100vw - 40px));
  padding: 16px;
  border: 1px solid rgba(151, 105, 58, 0.12);
  border-radius: 20px;
  background: rgba(255, 253, 248, 0.96);
  box-shadow: 0 18px 38px rgba(123, 76, 31, 0.14);
}

.hero-help-pop[hidden] {
  display: none;
}

.hero-help-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.hero-info-chip {
  display: inline-flex;
  align-items: center;
  padding: 8px 12px;
  border-radius: 999px;
  background: #fff4df;
  color: var(--text-soft);
  font-size: 0.85rem;
  font-weight: 700;
}

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
}

.controls {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  padding: 24px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
}

.field label {
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--text-soft);
}

.search-input-wrap {
  position: relative;
}

.field input,
.field select {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid rgba(151, 105, 58, 0.18);
  border-radius: var(--radius-md);
  background: var(--panel-strong);
  color: var(--text-main);
  font: inherit;
  outline: none;
  transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
}

.field input:focus,
.field select:focus {
  border-color: rgba(219, 119, 33, 0.6);
  box-shadow: 0 0 0 4px rgba(245, 162, 67, 0.14);
  transform: translateY(-1px);
}

.search-input-wrap input {
  padding-right: 52px;
}

.search-clear {
  position: absolute;
  top: 50%;
  right: 10px;
  transform: translateY(-50%);
  width: 32px;
  height: 32px;
  border: 0;
  border-radius: 999px;
  background: #f3e4cf;
  color: #8d6847;
  font: inherit;
  font-size: 1rem;
  font-weight: 800;
  line-height: 1;
  cursor: pointer;
}

.search-clear[hidden] {
  display: none;
}

.taste-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 76px;
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 0.86rem;
  font-weight: 800;
  color: #fff;
}

.taste-にがい { background: var(--taste-bitter); }
.taste-すっぱい { background: var(--taste-sour); }
.taste-からい { background: var(--taste-spicy); }
.taste-あまい { background: var(--taste-sweet); }
.taste-しぶい { background: var(--taste-astringent); }

.pokemon-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-top: 22px;
}

.history-heading {
  margin-top: 22px;
}

.history-heading[hidden] {
  display: none;
}

.history-heading-title {
  margin: 0;
  font-size: 1rem;
  font-weight: 800;
}

.history-heading-copy {
  margin: 6px 0 0;
  color: var(--text-soft);
  font-size: 0.84rem;
  line-height: 1.6;
}

.pokemon-card,
.empty-state {
  background: rgba(255, 253, 248, 0.92);
  border: 1px solid rgba(151, 105, 58, 0.12);
  border-radius: var(--radius-lg);
  box-shadow: 0 12px 30px rgba(123, 76, 31, 0.08);
}

.pokemon-card {
  padding: 12px 14px;
  cursor: pointer;
  transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
}

.pokemon-card:hover {
  transform: translateY(-2px);
  border-color: rgba(219, 119, 33, 0.34);
  box-shadow: 0 14px 28px rgba(123, 76, 31, 0.11);
}

.pokemon-card:focus-visible,
.related-card:focus-visible {
  outline: 3px solid rgba(219, 119, 33, 0.45);
  outline-offset: 3px;
}

.card-main {
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-body {
  min-width: 0;
  flex: 1;
}

.card-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.card-number {
  margin: 0;
  color: var(--text-soft);
  font-size: 0.72rem;
  font-weight: 700;
}

.card-name {
  margin: 2px 0 0;
  font-size: 0.96rem;
  font-weight: 800;
  line-height: 1.2;
}

.card-icon-wrap {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background:
    radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.95), rgba(255, 235, 206, 0.94));
  display: grid;
  place-items: center;
  flex-shrink: 0;
  overflow: hidden;
}

.card-icon {
  width: 44px;
  height: 44px;
  object-fit: contain;
}

.card-footer {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.card-footer-mobile {
  display: none;
}

.taste-caption {
  margin: 0;
  color: var(--text-soft);
  font-size: 0.7rem;
  font-weight: 700;
}

.taste-pill {
  min-width: 60px;
  padding: 6px 10px;
  font-size: 0.76rem;
}

.empty-state {
  grid-column: 1 / -1;
  padding: 48px 24px;
  text-align: center;
}

.empty-state h2 {
  margin: 0 0 10px;
  font-size: 1.3rem;
}

.empty-state p {
  margin: 0;
  color: var(--text-soft);
  line-height: 1.7;
}

.scroll-sentinel {
  width: 100%;
  height: 1px;
  margin-top: 8px;
}

.related-section {
  margin-top: 24px;
}

.related-section[hidden] {
  display: none;
}

.related-title {
  margin: 0 0 12px;
  font-size: 1rem;
  font-weight: 800;
}

.related-title-row {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  position: relative;
  margin-bottom: 12px;
}

.related-help-pop {
  position: absolute;
  top: calc(100% + 10px);
  left: 0;
  z-index: 5;
  width: min(420px, calc(100vw - 40px));
  padding: 14px;
  border: 1px solid rgba(151, 105, 58, 0.12);
  border-radius: 18px;
  background: rgba(255, 253, 248, 0.96);
  box-shadow: 0 18px 38px rgba(123, 76, 31, 0.14);
}

.related-help-pop[hidden] {
  display: none;
}

.related-help-text {
  margin: 0;
  color: var(--text-soft);
  font-size: 0.84rem;
  line-height: 1.7;
  font-weight: 700;
}

.related-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.related-card {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px;
  border: 1px solid rgba(151, 105, 58, 0.12);
  border-radius: 16px;
  background: rgba(255, 253, 248, 0.92);
  box-shadow: 0 10px 24px rgba(123, 76, 31, 0.08);
  cursor: pointer;
}

.related-icon-wrap {
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  border-radius: 14px;
  background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.95), rgba(255, 235, 206, 0.94));
  flex-shrink: 0;
}

.related-icon {
  width: 34px;
  height: 34px;
  object-fit: contain;
}

.related-body {
  min-width: 0;
}

.related-number {
  margin: 0;
  color: var(--text-soft);
  font-size: 0.68rem;
  font-weight: 700;
}

.related-name {
  margin: 2px 0 0;
  font-size: 0.84rem;
  font-weight: 800;
  line-height: 1.2;
  word-break: break-word;
}

.related-taste {
  margin-top: 6px;
}

.related-taste .taste-pill {
  min-width: 0;
  padding: 4px 8px;
  font-size: 0.68rem;
}

.site-footer {
  margin-top: 42px;
  padding-top: 24px;
  border-top: 1px solid rgba(151, 105, 58, 0.12);
}

.site-footer p {
  margin: 0;
  color: var(--text-soft);
  font-size: 0.85rem;
  line-height: 1.8;
}

@media (max-width: 900px) {
  .controls {
    grid-template-columns: 1fr;
  }

  .pokemon-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .related-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 640px) {
  .page {
    width: min(100% - 20px, 1120px);
    padding-top: 10px;
  }

  .hero {
    padding: 4px 0 16px;
  }

  .hero-title-row {
    gap: 10px;
    align-items: flex-start;
  }

  .hero-actions {
    top: -10px;
    right: -10px;
  }

  .hero-help {
    width: 34px;
    height: 34px;
  }

  .hero-github-link {
    width: 34px;
    height: 30px;
    border-radius: 0 0 0 12px;
    box-shadow: 0 6px 14px rgba(58, 42, 28, 0.16);
  }

  .hero-github-link svg {
    width: 15px;
    height: 15px;
  }

  .hero-help-pop {
    left: -4px;
    padding: 12px;
  }

  .hero-info-chip {
    font-size: 0.76rem;
    padding: 7px 10px;
  }

  .pokemon-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .related-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .related-card {
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 9px 6px;
  }

  .related-body {
    text-align: center;
  }

  .related-number {
    font-size: 0.62rem;
  }

  .related-name {
    font-size: 0.74rem;
  }

  .related-taste {
    margin-top: 5px;
  }

  .related-taste .taste-pill {
    padding: 4px 7px;
    font-size: 0.62rem;
  }

  .related-icon-wrap {
    width: 40px;
    height: 40px;
  }

  .related-icon {
    width: 32px;
    height: 32px;
  }

  .card-row {
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .pokemon-card {
    padding: 10px 6px;
    border-radius: 18px;
  }

  .card-main {
    flex-direction: column;
    gap: 6px;
    align-items: center;
  }

  .card-body {
    width: 100%;
  }

  .card-number {
    text-align: center;
    font-size: 0.62rem;
  }

  .card-name {
    margin: 0;
    font-size: 0.78rem;
    text-align: center;
    word-break: break-word;
  }

  .card-icon-wrap {
    width: 46px;
    height: 46px;
    border-radius: 14px;
  }

  .card-icon {
    width: 36px;
    height: 36px;
  }

  .card-footer {
    display: none;
  }

  .card-footer-mobile {
    display: flex;
    justify-content: center;
    margin-top: 6px;
    padding-left: 0;
  }

  .card-footer-mobile > div {
    display: flex;
    justify-content: center;
  }

  .card-footer-mobile .taste-caption {
    display: none;
  }

  .card-footer-mobile .taste-pill {
    min-width: fit-content;
    width: auto;
    padding: 5px 10px;
    font-size: 0.68rem;
  }
}
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="hero-kicker">ぽこあポケモン</p>
      <div class="hero-actions">
        <a
          class="hero-github-link"
          href="https://github.com/KoichiKiyokawa/pokopia-tools/tree/main"
          target="_blank"
          rel="noreferrer"
          aria-label="GitHub リポジトリを開く"
        ><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .5C5.65.5.5 5.66.5 12.02c0 5.09 3.3 9.41 7.87 10.94.58.11.79-.25.79-.56 0-.28-.01-1.19-.02-2.16-3.2.7-3.88-1.36-3.88-1.36-.52-1.34-1.28-1.69-1.28-1.69-1.04-.71.08-.69.08-.69 1.15.08 1.75 1.18 1.75 1.18 1.02 1.76 2.68 1.25 3.33.96.1-.74.4-1.25.72-1.54-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.26 1.18-3.06-.12-.29-.51-1.45.11-3.03 0 0 .97-.31 3.17 1.17a10.9 10.9 0 0 1 5.77 0c2.2-1.48 3.17-1.17 3.17-1.17.62 1.58.23 2.74.11 3.03.73.8 1.18 1.81 1.18 3.06 0 4.41-2.68 5.38-5.24 5.67.41.35.77 1.03.77 2.09 0 1.51-.01 2.72-.01 3.09 0 .31.21.67.8.56A11.53 11.53 0 0 0 23.5 12.02C23.5 5.66 18.35.5 12 .5Z"></path></svg><span class="sr-only">GitHub</span></a>
      </div>
      <div class="hero-title-row">
        <h1>味の好み検索ツール</h1>
        <button
          id="heroHelpButton"
          class="hero-help"
          type="button"
          aria-label="このツールの説明を表示"
          aria-expanded="false"
          aria-controls="heroHelpPop"
        >?</button>
        <div id="heroHelpPop" class="hero-help-pop" hidden>
          <div class="hero-help-chips">
            <span class="hero-info-chip">ポケモン名で検索できます</span>
            <span class="hero-info-chip">ひらがな入力にも対応しています</span>
            <span class="hero-info-chip">検索結果は図鑑番号順で表示されます</span>
            <span class="hero-info-chip">下へ進むと自動で続きを読み込みます</span>
          </div>
        </div>
      </div>
    </section>

    <section class="panel controls" aria-label="検索条件">
      <div class="field field-wide">
        <label for="searchName">ポケモン名で検索</label>
        <div class="search-input-wrap">
          <input id="searchName" type="text" placeholder="例: ピカチュウ、ふしぎだね">
          <button id="clearSearchButton" class="search-clear" type="button" aria-label="検索文字をクリア" hidden>×</button>
        </div>
      </div>
    </section>

    <section>
      <div id="historyHeading" class="history-heading" hidden>
        <h2 class="history-heading-title">検索履歴から表示中</h2>
        <p class="history-heading-copy">入力が空のときは、最近検索したポケモンを新しい順で表示しています。</p>
      </div>
      <div id="pokemonGrid" class="pokemon-grid" aria-live="polite"></div>
      <div id="scrollSentinel" class="scroll-sentinel" aria-hidden="true"></div>
    </section>

    <section id="relatedSection" class="related-section" hidden>
      <div class="related-title-row">
        <h2 class="related-title">関連ポケモン</h2>
        <button
          id="relatedHelpButton"
          class="hero-help"
          type="button"
          aria-label="関連ポケモンの説明を表示"
          aria-expanded="false"
          aria-controls="relatedHelpPop"
        >?</button>
        <div id="relatedHelpPop" class="related-help-pop" hidden>
          <p class="related-help-text">検索で見つかったポケモンを基準にして、図鑑番号が前後3番くらいの近いポケモンを表示しています。進化前後や近い番号の仲間を見つけやすくするための目安です。</p>
        </div>
      </div>
      <div id="relatedGrid" class="related-grid"></div>
    </section>

    <footer class="site-footer">
      <p>本ツールは個人による非公式のファンプロジェクトです。ポケモン画像および名称の権利は各権利元に帰属します。</p>
    </footer>
  </main>

  <script>
const POKEMON_TASTES = [
  {
    "dexNumber": 1,
    "name": "フシギダネ",
    "baseName": "フシギダネ",
    "taste": "あまい",
    "iconUrl": "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png"
  },
  {
    "dexNumber": 2,
    "name": "フシギソウ",
    "baseName": "フシギソウ",
    "taste": "すっぱい",
    "iconUrl": "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/2.png"
  },
  {
    "dexNumber": 3,
    "name": "フシギバナ",
    "baseName": "フシギバナ",
    "taste": "すっぱい",

  },
  {
    "dexNumber": 4,
    "name": "ヒトカゲ",
    "baseName": "ヒトカゲ",
    "taste": "からい",
    "iconUrl": "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png"
  },
  {
    "dexNumber": 5,
    "name": "リザード",
    "baseName": "リザード",
    "taste": "からい",
    "iconUrl": "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/5.png"
  },
  {
    "dexNumber": 6,
    "name": "リザードン",
    "baseName": "リザードン",
    "taste": "からい",
    "iconUrl": "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png"
  },
  {
    "dexNumber": 7,
    "name": "ゼニガメ",
    "baseName": "ゼニガメ",
    "taste": "あまい",
    "iconUrl": "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png"
  },
  {
    "dexNumber": 8,
    "name": "カメール",

const pokemonData = Array.isArray(POKEMON_TASTES) ? POKEMON_TASTES : [];

const ITEMS_PER_PAGE = 24;
const HISTORY_LIMIT = 100;
const HISTORY_STORAGE_KEY = "pokopiaRecentPokemonHistory";
const SEARCH_DEBOUNCE_MS = 180;

const historyHeading = document.getElementById("historyHeading");
const pokemonGrid = document.getElementById("pokemonGrid");
const scrollSentinel = document.getElementById("scrollSentinel");
const relatedSection = document.getElementById("relatedSection");
const relatedGrid = document.getElementById("relatedGrid");
const relatedHelpButton = document.getElementById("relatedHelpButton");
const relatedHelpPop = document.getElementById("relatedHelpPop");
const searchName = document.getElementById("searchName");
const clearSearchButton = document.getElementById("clearSearchButton");
const heroHelpButton = document.getElementById("heroHelpButton");
const heroHelpPop = document.getElementById("heroHelpPop");

let loadedPageCount = 1;
let scrollObserver;
let historySaveTimer;
let searchDebounceTimer;

function hiraToKata(text) {
  return text.replace(/[ぁ-ん]/g, (char) => (
    String.fromCharCode(char.charCodeAt(0) + 0x60)
  ));
}

function normalizeName(text) {
  return hiraToKata(text.trim())
    .normalize("NFKC")
    .replace(/[（）]/g, (char) => (char === "（" ? "(" : ")"))
    .toLowerCase();
}

function formatDexNumber(value) {
  return `No.${String(value).padStart(3, "0")}`;
}

function getTasteClass(taste) {
  return `taste-${taste}`;
}

function updateClearButton() {
  clearSearchButton.hidden = searchName.value.trim() === "";
}

function isEditableElement(element) {
  return element instanceof HTMLInputElement
    || element instanceof HTMLTextAreaElement
    || element instanceof HTMLSelectElement
    || (element instanceof HTMLElement && element.isContentEditable);
}

function focusSearchField() {
  searchName.focus();
  const cursorPosition = searchName.value.length;
  searchName.setSelectionRange(cursorPosition, cursorPosition);
}

function loadRecentHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_STORAGE_KEY);
    if (!raw) {
      return [];
    }

    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function saveRecentHistory(pokemonList) {
  if (!searchName.value.trim() || pokemonList.length === 0) {
    return;
  }

  const nextIds = pokemonList.map((pokemon) => pokemon.name);
  const merged = [...nextIds, ...loadRecentHistory()];
  const unique = [];

  for (const historyKey of merged) {
    if (!unique.includes(historyKey)) {
      unique.push(historyKey);
    }
    if (unique.length >= HISTORY_LIMIT) {
      break;
    }
  }

  localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(unique));
}

function scheduleHistorySave(pokemonList) {
  clearTimeout(historySaveTimer);
  historySaveTimer = setTimeout(() => {
    saveRecentHistory(pokemonList.slice(0, 20));
  }, 500);
}

function updateURL() {
  const params = new URLSearchParams();

  if (searchName.value.trim()) {
    params.set("q", searchName.value.trim());
  }

  const nextURL = `${window.location.pathname}${params.toString() ? `?${params}` : ""}`;
  window.history.replaceState(null, "", nextURL);
}

function loadStateFromURL() {
  const params = new URLSearchParams(window.location.search);

  if (params.has("q")) {
    searchName.value = params.get("q");
  }
}

function getFilteredData() {
  const query = normalizeName(searchName.value);

  if (!query) {
    const recentIds = loadRecentHistory();
    const recentPokemon = recentIds
      .map((historyKey) => pokemonData.find((pokemon) => pokemon.name === historyKey))
      .filter(Boolean);

    return recentPokemon.slice(0, HISTORY_LIMIT);
  }

  const filtered = pokemonData.filter((pokemon) => {
    const normalizedName = normalizeName(pokemon.name);
    const normalizedBaseName = normalizeName(pokemon.baseName);
    const matchesName = !query
      || normalizedName.includes(query)
      || normalizedBaseName.includes(query);
    return matchesName;
  });

  filtered.sort((a, b) => (
    a.dexNumber - b.dexNumber
    || a.name.localeCompare(b.name, "ja")
  ));

  return filtered;
}

function renderEmptyState() {
  historyHeading.hidden = true;
  pokemonGrid.innerHTML = `
    <div class="empty-state">
      <h2>${searchName.value.trim() ? "条件に合うポケモンが見つかりませんでした。" : "検索履歴がまだありません。"}</h2>
      <p>${searchName.value.trim() ? "検索語を変えて、もう一度お試しください。" : "ポケモン名を検索すると、ここに直近の結果が表示されます。"}</p>
    </div>
  `;
  relatedSection.hidden = true;
  relatedGrid.innerHTML = "";
}

function selectPokemonName(name) {
  clearTimeout(searchDebounceTimer);
  searchName.value = name;
  if (document.activeElement instanceof HTMLElement) {
    document.activeElement.blur();
  }
  resetAndRender();
}

function bindPokemonSelection(element, name) {
  element.tabIndex = 0;
  element.setAttribute("role", "button");
  element.setAttribute("aria-label", `${name} を入力欄に入れて検索`);
  element.addEventListener("click", () => {
    selectPokemonName(name);
  });
  element.addEventListener("keydown", (event) => {
    if (event.key !== "Enter" && event.key !== " ") {
      return;
    }

    event.preventDefault();
    selectPokemonName(name);
  });
}

function renderCards(pokemonList) {
  pokemonGrid.innerHTML = "";

  for (const pokemon of pokemonList) {
    const card = document.createElement("article");
    card.className = "pokemon-card";
    card.innerHTML = `
      <div class="card-main">
        <div class="card-icon-wrap">
          <img
            class="card-icon"
            src="${pokemon.iconUrl}"
            alt="${pokemon.name} のアイコン"
            loading="lazy"
            width="60"
            height="60"
          >
        </div>
        <div class="card-body">
          <p class="card-number">${formatDexNumber(pokemon.dexNumber)}</p>
          <div class="card-row">
            <h2 class="card-name">${pokemon.name}</h2>
            <div class="card-footer">
              <p class="taste-caption">好きな味</p>
              <span class="taste-pill ${getTasteClass(pokemon.taste)}">${pokemon.taste}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="card-footer-mobile">
        <div>
          <p class="taste-caption">好きな味</p>
          <span class="taste-pill ${getTasteClass(pokemon.taste)}">${pokemon.taste}</span>
        </div>
      </div>
    `;
    bindPokemonSelection(card, pokemon.name);
    pokemonGrid.appendChild(card);
  }
}

function renderRelatedPokemon(filtered) {
  if (!searchName.value.trim() || filtered.length === 0) {
    relatedSection.hidden = true;
    relatedGrid.innerHTML = "";
    return;
  }

  const basePokemon = filtered[0];
  const related = pokemonData
    .filter((pokemon) => (
      pokemon.name !== basePokemon.name
      && Math.abs(pokemon.dexNumber - basePokemon.dexNumber) <= 3
    ))
    .sort((a, b) => (
      a.dexNumber - b.dexNumber
      || a.name.localeCompare(b.name, "ja")
    ));

  if (related.length === 0) {
    relatedSection.hidden = true;
    relatedGrid.innerHTML = "";
    return;
  }

  relatedSection.hidden = false;
  relatedGrid.innerHTML = "";

  for (const pokemon of related) {
    const card = document.createElement("article");
    card.className = "related-card";
    card.innerHTML = `
      <div class="related-icon-wrap">
        <img
          class="related-icon"
          src="${pokemon.iconUrl}"
          alt="${pokemon.name} のアイコン"
          loading="lazy"
          width="34"
          height="34"
        >
      </div>
      <div class="related-body">
        <p class="related-number">${formatDexNumber(pokemon.dexNumber)}</p>
        <p class="related-name">${pokemon.name}</p>
        <div class="related-taste">
          <span class="taste-pill ${getTasteClass(pokemon.taste)}">${pokemon.taste}</span>
        </div>
      </div>
    `;
    bindPokemonSelection(card, pokemon.name);
    relatedGrid.appendChild(card);
  }
}

function setupInfiniteScroll(totalItems) {
  if (scrollObserver) {
    scrollObserver.disconnect();
  }

  const hasMore = loadedPageCount * ITEMS_PER_PAGE < totalItems;
  scrollSentinel.hidden = !hasMore;

  if (!hasMore) {
    return;
  }

  scrollObserver = new IntersectionObserver((entries) => {
    const [entry] = entries;
    if (!entry || !entry.isIntersecting) {
      return;
    }

    loadedPageCount += 1;
    render();
  }, {
    rootMargin: "320px 0px",
  });

  scrollObserver.observe(scrollSentinel);
}

function render() {
  const filtered = getFilteredData();
  const totalItems = filtered.length;
  const totalPages = Math.max(1, Math.ceil(totalItems / ITEMS_PER_PAGE));
  const isHistoryMode = !searchName.value.trim();

  loadedPageCount = Math.min(loadedPageCount, totalPages);

  if (totalItems === 0) {
    renderEmptyState();
    scrollSentinel.hidden = true;
    updateURL();
    return;
  }

  const visibleCount = loadedPageCount * ITEMS_PER_PAGE;
  const pageItems = filtered.slice(0, visibleCount);

  if (searchName.value.trim()) {
    scheduleHistorySave(filtered);
  }

  historyHeading.hidden = !isHistoryMode;
  renderCards(pageItems);
  renderRelatedPokemon(filtered);
  setupInfiniteScroll(totalItems);
  updateURL();
}

function resetAndRender() {
  loadedPageCount = 1;
  if (!searchName.value.trim()) {
    clearTimeout(historySaveTimer);
  }
  updateClearButton();
  render();
}

function scheduleSearchRender() {
  updateClearButton();
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => {
    resetAndRender();
  }, SEARCH_DEBOUNCE_MS);
}

function closeHelpPop() {
  heroHelpPop.hidden = true;
  heroHelpButton.setAttribute("aria-expanded", "false");
}

function closeRelatedHelpPop() {
  relatedHelpPop.hidden = true;
  relatedHelpButton.setAttribute("aria-expanded", "false");
}

function toggleHelpPop() {
  const willOpen = heroHelpPop.hidden;
  heroHelpPop.hidden = !willOpen;
  heroHelpButton.setAttribute("aria-expanded", willOpen ? "true" : "false");
}

function toggleRelatedHelpPop() {
  const willOpen = relatedHelpPop.hidden;
  relatedHelpPop.hidden = !willOpen;
  relatedHelpButton.setAttribute("aria-expanded", willOpen ? "true" : "false");
}

function handleGlobalSearchShortcut(event) {
  if (event.isComposing || event.altKey || event.ctrlKey || event.metaKey) {
    return;
  }

  if (event.key !== "/" && event.key !== "・") {
    return;
  }

  if (isEditableElement(document.activeElement)) {
    return;
  }

  event.preventDefault();
  focusSearchField();
}

loadStateFromURL();
updateClearButton();

searchName.addEventListener("input", scheduleSearchRender);
clearSearchButton.addEventListener("click", () => {
  clearTimeout(searchDebounceTimer);
  searchName.value = "";
  focusSearchField();
  resetAndRender();
});
heroHelpButton.addEventListener("click", (event) => {
  event.stopPropagation();
  toggleHelpPop();
});
relatedHelpButton.addEventListener("click", (event) => {
  event.stopPropagation();
  toggleRelatedHelpPop();
});
document.addEventListener("click", (event) => {
  if (!heroHelpPop.hidden && !heroHelpPop.contains(event.target) && event.target !== heroHelpButton) {
    closeHelpPop();
  }
  if (!relatedHelpPop.hidden && !relatedHelpPop.contains(event.target) && event.target !== relatedHelpButton) {
    closeRelatedHelpPop();
  }
});
document.addEventListener("keydown", handleGlobalSearchShortcut);

render();
